<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAP S/4HANA OData Explorer | Oryonix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.6);
      --card-hover: rgba(15, 23, 42, 0.8);
      --border: rgba(51, 65, 85, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #10b981;
      --accent-soft: rgba(16, 185, 129, 0.1);
      --danger: #f43f5e;
      --glass: blur(12px) saturate(180%);
    }

    * {
      box-sizing: border-box;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
    }

    header h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-top: 12px;
    }

    .glass-panel {
      background: var(--card);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .glass-panel:hover {
      border-color: rgba(148, 163, 184, 0.3);
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      align-items: flex-end;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      width: 100%;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .btn {
      padding: 14px 28px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #020617;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(16, 185, 129, 0.4);
    }

    .btn-secondary {
      background: rgba(248, 240, 252, 0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(248, 240, 252, 0.1);
    }

    .status-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .status-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
    }

    .status-card .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status-card .value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .badge-accent { background: var(--accent-soft); color: var(--accent); }

    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th {
      text-align: left;
      padding: 18px 20px;
      background: rgba(248, 240, 252, 0.03);
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    tr:hover td {
      background: rgba(148, 163, 184, 0.05);
    }

    .loader {
      display: none;
      margin: 40px auto;
      width: 40px;
      height: 40px;
      border: 4px solid var(--accent-soft);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message {
      padding: 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      margin-top: 16px;
      display: none;
    }

    .message-error {
      background: rgba(244, 63, 94, 0.1);
      color: var(--danger);
      border: 1px solid rgba(244, 63, 94, 0.2);
    }

    .message-success {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--accent-soft);
    }

    @media (max-width: 768px) {
      .shell { padding: 20px 16px; }
      header h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>OData Explorer</h1>
      <p>High-performance SAP S/4HANA connectivity via Oryonix</p>
    </header>

    <div class="glass-panel">
      <div class="controls-grid">
        <div class="control-group">
          <label for="apiSelect">Target Service</label>
          <select id="apiSelect"></select>
        </div>

        <div class="control-group">
          <label for="apiKey">SAP Sandbox API Key</label>
          <input id="apiKey" type="password" placeholder="Paste APIKey here" />
        </div>

        <div class="control-group">
          <label for="top">Row Limit</label>
          <input id="top" type="number" min="1" max="100" value="5" />
        </div>

        <div class="control-group">
          <button class="btn btn-primary" id="loadButton">
            <span>Fetch Data</span>
          </button>
        </div>
      </div>
      
      <div id="statusMessage" class="message"></div>
    </div>

    <div class="status-cards">
      <div class="status-card">
        <div class="label">Status</div>
        <div class="value" id="statusValue">Idle</div>
      </div>
      <div class="status-card">
        <div class="label">Active Entity</div>
        <div class="value" id="activeEntityValue">—</div>
      </div>
      <div class="status-card">
        <div class="label">Count</div>
        <div class="value" id="countValue">0</div>
      </div>
      <div class="status-card">
        <div class="label">Response Time</div>
        <div class="value" id="timeValue">0ms</div>
      </div>
    </div>

    <div class="glass-panel" style="padding: 0; overflow: hidden;">
      <div style="padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <div>
          <div id="techBadge" class="badge badge-accent">Ready</div>
          <h2 id="serviceTitle" style="margin: 0; font-size: 1.25rem;">Live Data Preview</h2>
        </div>
        <button class="btn btn-secondary" id="reloadApisButton">Refresh Schema</button>
      </div>

      <div class="loader" id="mainLoader"></div>

      <div class="table-container" id="tableContainer">
        <table id="dataTable">
          <thead><tr id="tableHeadRow"></tr></thead>
          <tbody id="tableBody">
            <tr><td colspan="100%" style="text-align: center; padding: 60px; color: var(--muted);">Select an API and fetch data to begin exploration.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_LIST_URL = "/s4hana/apis";
    const API_ROWS_BASE = "/s4hana/apis";
    
    const elements = {
      apiSelect: document.getElementById('apiSelect'),
      apiKey: document.getElementById('apiKey'),
      top: document.getElementById('top'),
      loadButton: document.getElementById('loadButton'),
      reloadApisButton: document.getElementById('reloadApisButton'),
      statusValue: document.getElementById('statusValue'),
      activeEntityValue: document.getElementById('activeEntityValue'),
      countValue: document.getElementById('countValue'),
      timeValue: document.getElementById('timeValue'),
      statusMessage: document.getElementById('statusMessage'),
      tableHeadRow: document.getElementById('tableHeadRow'),
      tableBody: document.getElementById('tableBody'),
      mainLoader: document.getElementById('mainLoader'),
      tableContainer: document.getElementById('tableContainer'),
      techBadge: document.getElementById('techBadge'),
      serviceTitle: document.getElementById('serviceTitle'),
    };

    let apiCache = [];

    function showMessage(text, type = 'success') {
      elements.statusMessage.textContent = text;
      elements.statusMessage.className = `message message-${type}`;
      elements.statusMessage.style.display = 'block';
      setTimeout(() => { elements.statusMessage.style.opacity = '0'; }, 4000);
      setTimeout(() => { elements.statusMessage.style.display = 'none'; elements.statusMessage.style.opacity = '1'; }, 4500);
    }

    function setUIState(loading = false) {
      elements.mainLoader.style.display = loading ? 'block' : 'none';
      elements.tableContainer.style.opacity = loading ? '0.3' : '1';
      elements.loadButton.disabled = loading;
    }

    async function fetchAPIs() {
      try {
        const res = await fetch(API_LIST_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const data = await res.json();
        apiCache = data.available_apis;
        
        elements.apiSelect.innerHTML = apiCache.map(api => 
          `<option value="${api.api_name}">${api.label} (${api.technical_name})</option>`
        ).join('');
        
        updateHeader();
      } catch (err) {
        showMessage('Failed to load API registry: ' + err.message, 'error');
      }
    }

    function updateHeader() {
      const selected = apiCache.find(a => a.api_name === elements.apiSelect.value);
      if (selected) {
        elements.serviceTitle.textContent = selected.label;
        elements.techBadge.textContent = selected.technical_name;
        elements.activeEntityValue.textContent = selected.entity_set;
      }
    }

    async function loadData() {
      const selected = apiCache.find(a => a.api_name === elements.apiSelect.value);
      const key = elements.apiKey.value.trim();
      const top = elements.top.value;

      if (!key) {
        showMessage('Please enter an SAP API Key', 'error');
        return;
      }

      setUIState(true);
      elements.statusValue.textContent = 'Fetching...';
      const start = performance.now();

      try {
        const res = await fetch(`${API_ROWS_BASE}/${selected.api_name}/rows-safe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: key, top: parseInt(top) })
        });
        
        const result = await res.json();
        const end = performance.now();
        elements.timeValue.textContent = `${Math.round(end - start)}ms`;

        if (!result.ok) {
          throw new Error(result.error?.message || 'Unknown server error');
        }

        renderTable(result.columns, result.rows);
        elements.countValue.textContent = result.rows.length;
        elements.statusValue.textContent = 'Linked';
        showMessage(`Successfully retrieved ${result.rows.length} records.`);
      } catch (err) {
        elements.statusValue.textContent = 'Error';
        showMessage(err.message, 'error');
        elements.tableBody.innerHTML = `<tr><td colspan="100%" style="text-align: center; color: var(--danger); padding: 40px;">${err.message}</td></tr>`;
      } finally {
        setUIState(false);
      }
    }

    function renderTable(cols, rows) {
      elements.tableHeadRow.innerHTML = cols.map(c => `<th>${c.label}</th>`).join('');
      
      if (rows.length === 0) {
        elements.tableBody.innerHTML = '<tr><td colspan="100%" style="text-align: center; padding: 40px; color: var(--muted);">No records found in SAP for this query.</td></tr>';
        return;
      }

      elements.tableBody.innerHTML = rows.map(row => `
        <tr>
          ${cols.map(c => `<td>${row[c.key] ?? '—'}</td>`).join('')}
        </tr>
      `).join('');
    }

    elements.loadButton.addEventListener('click', loadData);
    elements.reloadApisButton.addEventListener('click', fetchAPIs);
    elements.apiSelect.addEventListener('change', updateHeader);

    // Init
    fetchAPIs();
  </script>
</body>
</html>
