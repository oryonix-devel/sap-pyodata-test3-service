<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAP OData Explorer | Oryonix Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.6);
      --border: rgba(51, 65, 85, 0.4);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #10b981;
      --danger: #f43f5e;
      --glass: blur(12px) saturate(180%);
      --console-bg: #0f172a;
    }

    * { box-sizing: border-box; transition: all 0.15s ease; }
    
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-container {
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
      width: 100%;
    }

    header { margin-bottom: 40px; text-align: center; }
    header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .glass-panel {
      background: var(--card);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    
    input, select {
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.9rem;
      width: 100%;
    }

    input:focus, select:focus { outline: none; border-color: var(--accent); }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: var(--accent); color: #020617; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }

    .status-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 20px;
      flex: 1;
    }

    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-weight: 700; font-size: 1rem; }

    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 16px; background: rgba(255,255,255,0.02); color: var(--muted); font-size: 0.85rem; border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

    /* Console Styles */
    .console-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 250px;
      background: var(--console-bg);
      border-top: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }

    .console-header {
      padding: 8px 20px;
      background: rgba(0,0,0,0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .console-title { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }
    
    .console-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .log-line { margin-bottom: 4px; border-left: 2px solid transparent; padding-left: 10px; }
    .log-info { border-color: var(--accent); color: #fff; }
    .log-error { border-color: var(--danger); color: var(--danger); }
    .log-warn { border-color: #f59e0b; color: #f59e0b; }
    .log-time { color: var(--muted); margin-right: 10px; font-size: 0.7rem; }

    @media (max-width: 768px) {
      .app-container { padding: 20px 16px; padding-bottom: 280px; }
      .console-panel { height: 200px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>SAP OData Explorer</h1>
    </header>

    <div class="glass-panel">
      <div class="grid-4">
        <div class="field">
          <label>Target API Service</label>
          <select id="apiSelect">
            <option value="">Connecting to registry...</option>
          </select>
        </div>
        <div class="field">
          <label>SAP Sandbox API Key</label>
          <input id="sapKey" type="password" placeholder="HibHlLvSl..." />
        </div>
        <div class="field">
          <label>Rows</label>
          <input id="rowCount" type="number" value="5" min="1" max="100" />
        </div>
        <div style="display: flex; align-items: flex-end; gap: 12px;">
          <button id="fetchBtn" class="btn btn-primary" style="flex: 1;">Fetch Data</button>
          <button id="reloadBtn" class="btn btn-secondary" title="Reload Registry">↺</button>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="stat-item">
        <div class="stat-label">Connection Status</div>
        <div id="connStatus" class="stat-value">Booting...</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Active Entity</div>
        <div id="activeEntity" class="stat-value">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Records</div>
        <div id="statCount" class="stat-value">0</div>
      </div>
    </div>

    <div class="glass-panel" style="padding: 0; min-height: 400px; display: flex; flex-direction: column;">
      <div style="padding: 20px 32px; border-bottom: 1px solid var(--border);">
        <h2 id="serviceLabel" style="margin: 0; font-size: 1.25rem;">Live Exploration</h2>
      </div>
      <div id="tableScroll" class="table-container" style="flex: 1;">
        <table id="mainTable">
          <thead><tr id="tableHead"></tr></thead>
          <tbody id="tableBody">
            <tr><td colspan="100%" style="text-align: center; padding: 100px; color: var(--muted);">Select an API and provide your key to begin.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- Spacer for console -->
    <div style="height: 260px;"></div>
  </div>

  <div class="console-panel">
    <div class="console-header">
      <div class="console-title">System Console</div>
      <button onclick="clearLogs()" style="background:none; border:none; color:var(--muted); font-family:inherit; font-size:0.7rem; cursor:pointer;">CLEAR [X]</button>
    </div>
    <div id="consoleBody" class="console-body"></div>
  </div>

  <script>
    const API_LIST_URL = "/s4hana/apis";
    const API_ROWS_BASE = "/s4hana/apis";

    const els = {
      apiSelect: document.getElementById('apiSelect'),
      sapKey: document.getElementById('sapKey'),
      rowCount: document.getElementById('rowCount'),
      fetchBtn: document.getElementById('fetchBtn'),
      reloadBtn: document.getElementById('reloadBtn'),
      connStatus: document.getElementById('connStatus'),
      activeEntity: document.getElementById('activeEntity'),
      statCount: document.getElementById('statCount'),
      serviceLabel: document.getElementById('serviceLabel'),
      tableHead: document.getElementById('tableHead'),
      tableBody: document.getElementById('tableBody'),
      console: document.getElementById('consoleBody'),
    };

    let apiCache = [];

    function log(msg, type = 'info') {
      const line = document.createElement('div');
      line.className = `log-line log-${type}`;
      const time = new Date().toLocaleTimeString();
      line.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
      els.console.appendChild(line);
      els.console.scrollTop = els.console.scrollHeight;
    }

    function clearLogs() { els.console.innerHTML = ''; }

    async function fetchRegistry() {
      log("Initializing OData Registry sync...");
      els.connStatus.textContent = "Syncing...";
      
      try {
        const res = await fetch(API_LIST_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          log(`Registry Sync Failed: ${res.status} ${res.statusText}`, 'error');
          log(`Response: ${JSON.stringify(data, null, 2)}`, 'error');
          els.connStatus.textContent = "Auth Error";
          return;
        }

        apiCache = data.available_apis || [];
        els.apiSelect.innerHTML = apiCache.map(api => 
          `<option value="${api.api_name}">${api.label}</option>`
        ).join('');
        
        log(`Registry Loaded: ${apiCache.length} endpoints available.`, 'info');
        updateHeader();
        els.connStatus.textContent = "Ready";
      } catch (err) {
        log(`System Exception during Sync: ${err.message}`, 'error');
        els.connStatus.textContent = "Offline";
      }
    }

    function updateHeader() {
      const selected = apiCache.find(a => a.api_name === els.apiSelect.value);
      if (selected) {
        els.serviceLabel.textContent = selected.label;
        els.activeEntity.textContent = selected.entity_set;
        log(`Switched context to ${selected.technical_name}`);
      }
    }

    async function loadData() {
      const selected = apiCache.find(a => a.api_name === els.apiSelect.value);
      const key = els.sapKey.value.trim();
      
      if (!key) {
        log("Fetch aborted: SAP API Key is missing.", "warn");
        return;
      }

      log(`Requesting ${els.rowCount.value} rows from ${selected.technical_name}...`);
      els.fetchBtn.disabled = true;
      els.connStatus.textContent = "Fetching...";

      try {
        const res = await fetch(`${API_ROWS_BASE}/${selected.api_name}/rows-safe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: key, top: parseInt(els.rowCount.value) })
        });
        
        const result = await res.json();

        if (!result.ok) {
          log(`OData Execution Error: ${result.error?.type || 'Unknown'}`, 'error');
          log(`Message: ${result.error?.message || 'Check platform logs'}`, 'error');
          throw new Error(result.error?.message || "OData Failure");
        }

        log(`Data acquired: ${result.rows.length} records parsed from SAP Sandbox.`, 'info');
        renderTable(result.columns, result.rows);
        els.statCount.textContent = result.rows.length;
        els.connStatus.textContent = "Synchronized";
      } catch (err) {
        log(`Terminal Error: ${err.message}`, 'error');
        els.tableBody.innerHTML = `<tr><td colspan="100%" style="text-align: center; color: var(--danger); padding: 60px;">${err.message}</td></tr>`;
        els.connStatus.textContent = "Failed";
      } finally {
        els.fetchBtn.disabled = false;
      }
    }

    function renderTable(cols, rows) {
      els.tableHead.innerHTML = cols.map(c => `<th>${c.label}</th>`).join('');
      if (rows.length === 0) {
        els.tableBody.innerHTML = '<tr><td colspan="100%" style="text-align: center; padding: 60px; color: var(--muted);">Connected but entity is empty.</td></tr>';
        return;
      }
      els.tableBody.innerHTML = rows.map(row => `
        <tr>${cols.map(c => `<td>${row[c.key] ?? '—'}</td>`).join('')}</tr>
      `).join('');
    }

    els.fetchBtn.addEventListener('click', loadData);
    els.reloadBtn.addEventListener('click', fetchRegistry);
    els.apiSelect.addEventListener('change', updateHeader);

    // Initial Sync
    fetchRegistry();
  </script>
</body>
</html>
